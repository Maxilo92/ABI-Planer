name: Regression Guard

on:
  pull_request:
    branches: [main, release]
  push:
    branches: [main, release]

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint
        continue-on-error: true

      - name: Run backend tests
        run: npx ts-node functions/__tests__/rarity.test.ts

      - name: Run regression guard
        run: npm run test:regressions

      - name: Type check
        run: npx tsc --noEmit

      - name: Production build
        run: npm run build
